<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 监所定位管理系统</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f1923; }
    .login-box {
      width: 360px; background: #131e2b; border: 1px solid #2a3a50;
      border-radius: 10px; padding: 40px 36px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .icon { font-size: 40px; }
    .login-logo h1 { font-size: 18px; color: #e0eaf5; margin-top: 10px; font-weight: 600; }
    .login-logo p { font-size: 12px; color: #5a7a9a; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: #7a9fc0; margin-bottom: 6px; }
    .form-group input {
      width: 100%; background: #1a2535; border: 1px solid #2a3a50;
      color: #e0eaf5; padding: 10px 12px; border-radius: 6px; font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #4a8fd8; }
    .btn-login {
      width: 100%; padding: 11px; background: #1a4a8a; border: none;
      color: #90c0f0; font-size: 14px; font-weight: 600; border-radius: 6px;
      cursor: pointer; margin-top: 8px; transition: background 0.15s;
    }
    .btn-login:hover { background: #2a5aa0; }
    .btn-login:disabled { background: #2a3a50; color: #5a7a9a; cursor: not-allowed; }
    .error-msg { color: #f44336; font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }
    .footer-tip { text-align: center; font-size: 11px; color: #3a5a7a; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🔒</div>
      <h1>监所定位管理系统</h1>
      <p>Prison Guard Management System</p>
    </div>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input id="username" type="text" placeholder="请输入用户名" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" required />
      </div>
      <button class="btn-login" id="login-btn" type="submit">登 录</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
    <div class="footer-tip">首次登录请使用管理员账号，登录后请及时修改密码</div>
  </div>
  <script>
    // 已登录则直接跳转
    if (localStorage.getItem('token')) {
      fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
      }).then(r => { if (r.ok) location.href = '/'; });
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = '登录中...';
      errEl.textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          location.href = '/';
        } else {
          errEl.textContent = data.detail || '登录失败';
        }
      } catch (err) {
        errEl.textContent = '网络错误，请检查服务器连接';
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }
  </script>
</body>
</html>
